# CRE platform deploy is whitelisted-only; we use local simulate + --broadcast for real HTTP/consensus output,
# then scripts/deploy-all.sh submits setMockPrice on Arc. See SETUP.md §4.
# Example: cre workflow simulate . --target local-simulation --broadcast
# Requires: CRE CLI, dependencies (npm ci in this directory). Simulate does not need CRE_API_KEY.

local-simulation:
  user-workflow:
    workflow-owner-address: ""
    workflow-name: "slabfi-price-oracle"
    workflow-artifacts:
      workflow-path: "./main.ts"
      config-path: "./config.json"

production-testnet:
  user-workflow:
    workflow-owner-address: ""
    workflow-name: "slabfi-price-oracle"
    workflow-artifacts:
      workflow-path: "./main.ts"
      config-path: "./config.json"

# Generated by scripts/deploy-all.sh when DEPLOY_CRE_WORKFLOW=1 (config.deploy.json is gitignored).
arc-testnet-deploy:
  user-workflow:
    workflow-owner-address: ""
    workflow-name: "slabfi-price-oracle"
    workflow-artifacts:
      workflow-path: "./main.ts"
      config-path: "./config.deploy.json"
