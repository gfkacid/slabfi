# Run from this directory: cre workflow simulate price-oracle --target local-simulation --broadcast
# Requires: CRE CLI, Bun 1.2.21+, cre account login, dependencies (bun install)

local-simulation:
  user-workflow:
    workflow-owner-address: ""
    workflow-name: "slabfi-price-oracle"
    workflow-artifacts:
      workflow-path: "./main.ts"
      config-path: "./config.json"

production-testnet:
  user-workflow:
    workflow-owner-address: ""
    workflow-name: "slabfi-price-oracle"
    workflow-artifacts:
      workflow-path: "./main.ts"
      config-path: "./config.json"

# Generated by scripts/deploy-all.sh when DEPLOY_CRE_WORKFLOW=1 (config.deploy.json is gitignored).
arc-testnet-deploy:
  user-workflow:
    workflow-owner-address: ""
    workflow-name: "slabfi-price-oracle"
    workflow-artifacts:
      workflow-path: "./main.ts"
      config-path: "./config.deploy.json"
