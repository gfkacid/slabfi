[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules", "../node_modules"]
allow_paths = ["src", "lib", "../node_modules"]
ffi = true
fs_permissions = [
    { access = "read", path = "../scripts" },
    { access = "read-write", path = "./deployments" },
]
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts@5.0.2/=lib/openzeppelin-contracts/contracts/",
    "@layerzerolabs/lz-evm-protocol-v2/contracts/=lib/LayerZero-v2/packages/layerzero-v2/evm/protocol/contracts/",
    "@layerzerolabs/lz-evm-messagelib-v2/contracts/=lib/LayerZero-v2/packages/layerzero-v2/evm/messagelib/contracts/",
    "@layerzerolabs/oapp-evm/contracts/=lib/LayerZero-v2/packages/layerzero-v2/evm/oapp/contracts/"
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
