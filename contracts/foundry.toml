[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules", "../node_modules"]
allow_paths = ["src", "lib", "../node_modules"]
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts@5.0.2/=lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts-ccip/contracts/=../node_modules/@chainlink/contracts-ccip/contracts/"
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
